<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --grass:#1e6b32;--grass2:#196128;
  --panel:rgba(12,18,28,0.88);--panel-light:rgba(20,30,46,0.82);--panel-border:rgba(255,255,255,0.12);
  --gold:#f5a623;--gold2:#d4891c;--gold-glow:rgba(245,166,35,0.3);
  --cyan:#00d4ff;--cyan2:#0099cc;--cyan-glow:rgba(0,212,255,0.25);
  --green:#00e676;--green2:#00b85a;--green-glow:rgba(0,230,118,0.2);
  --red:#ff3d3d;--red2:#cc2222;--red-glow:rgba(255,61,61,0.2);
  --purple:#b388ff;--purple2:#7c4dff;
  --text:#f0f4f8;--text2:#a8b8cc;--text3:#607080;
  --radius:6px;--radius-lg:10px;
}

/* PITCH */
body{
  min-height:100vh;
  background-color:var(--grass);
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 52px,rgba(0,0,0,0.07) 52px,rgba(0,0,0,0.07) 104px),
    repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(255,255,255,0.025) 80px,rgba(255,255,255,0.025) 81px);
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;
  color:var(--text);
  position:relative;
}

/* Pitch lines */
body::before{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:260px;height:260px;border-radius:50%;border:2px solid rgba(255,255,255,0.06);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:2px;border-radius:50%;box-shadow:0 0 0 10px rgba(255,255,255,0.04);pointer-events:none;z-index:0}

/* PASSWORD */
#password-screen{position:fixed;inset:0;z-index:1000;background:linear-gradient(160deg,rgba(10,20,15,0.97) 0%,rgba(15,35,22,0.96) 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.pw-wrap{width:100%;max-width:360px;text-align:center}
.pw-crest{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--grass),#0a2e14);border:3px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px;box-shadow:0 0 30px rgba(0,230,118,0.2)}
.pw-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:4px;color:var(--text);margin-bottom:3px}
.pw-sub{font-size:12px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
.pw-panel{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius-lg);padding:28px 24px;backdrop-filter:blur(12px)}
.pw-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;text-align:left}
.pw-field{width:100%;padding:12px 16px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:22px;text-align:center;letter-spacing:5px;outline:none;transition:border-color .2s}
.pw-field:focus{border-color:var(--green2);box-shadow:0 0 0 2px var(--green-glow)}
.pw-btn{width:100%;margin-top:12px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,var(--green2),#006e35);border:none;border-radius:var(--radius);color:#fff;cursor:pointer;transition:opacity .2s;box-shadow:0 4px 12px rgba(0,184,90,0.3)}
.pw-btn:hover{opacity:.88}
.pw-error{font-size:12px;color:var(--red);margin-top:10px;min-height:16px;text-align:center}
.pw-hint{font-size:11px;color:var(--text3);margin-top:16px;letter-spacing:1px}

/* HEADER — FIFA scoreboard style */
#main-app{display:none;position:relative;z-index:1}
.app-header{background:var(--panel);border-bottom:2px solid var(--gold);backdrop-filter:blur(16px);padding:0 20px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:56px;gap:12px}
.logo-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-ball{font-size:22px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold);text-shadow:0 0 12px var(--gold-glow)}
.logo-divider{width:1px;height:24px;background:var(--panel-border);margin:0 4px}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.header-spacer{flex:1}
.hdr-stat{display:flex;flex-direction:column;align-items:center;padding:0 14px;border-left:1px solid var(--panel-border)}
.hdr-stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--gold);text-shadow:0 0 8px var(--gold-glow)}
.hdr-stat-lbl{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.hdr-stat.blue .hdr-stat-val{color:var(--cyan);text-shadow:0 0 8px var(--cyan-glow)}
.sync-btn{font-size:11px;font-weight:600;padding:7px 14px;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:var(--text2);cursor:pointer;transition:all .15s;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;white-space:nowrap;margin-left:8px}
.sync-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.sync-btn.syncing{color:var(--gold);border-color:rgba(245,166,35,0.3)}

/* NAV — FIFA tab bar */
.nav-tabs{background:rgba(8,14,22,0.75);border-bottom:1px solid var(--panel-border);backdrop-filter:blur(8px);padding:0 20px}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-tab{font-size:12px;font-weight:700;padding:11px 18px;border:none;background:none;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:2px;text-transform:uppercase;transition:all .15s;font-family:'Barlow Condensed',sans-serif}
.nav-tab:hover{color:var(--text2)}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);text-shadow:0 0 8px var(--gold-glow)}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:18px 20px}

/* SYNC STATUS */
.sync-status{font-size:11px;padding:8px 14px;background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius);color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px;backdrop-filter:blur(8px);letter-spacing:.5px}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--text3)}
.sync-dot.ok{background:var(--green2);box-shadow:0 0 6px var(--green-glow)}
.sync-dot.err{background:var(--red)}
.sync-dot.loading{background:var(--gold);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* BANNER */
.reminder-banner{display:none;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius);margin-bottom:14px;border:1px solid;backdrop-filter:blur(8px)}
.reminder-banner.urgent{background:rgba(245,166,35,0.1);border-color:rgba(245,166,35,0.3);color:var(--gold)}
.reminder-banner.soon{background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.2);color:var(--cyan)}
.reminder-banner.playing{background:rgba(255,61,61,0.1);border-color:rgba(255,61,61,0.3);color:var(--red)}
.reminder-icon{font-size:18px;flex-shrink:0}
.reminder-body{flex:1}
.reminder-title{font-weight:700;font-size:12px;margin-bottom:2px;letter-spacing:.5px;text-transform:uppercase}
.reminder-sub{font-size:11px;opacity:.8;line-height:1.4}
.reminder-cta{font-size:11px;font-weight:700;padding:5px 12px;border-radius:var(--radius);border:1px solid currentColor;background:none;color:inherit;cursor:pointer;font-family:'Barlow Condensed',sans-serif;white-space:nowrap;text-decoration:none;letter-spacing:1px;text-transform:uppercase}

/* FILTER */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--panel-border);background:var(--panel);color:var(--text3);cursor:pointer;transition:all .15s;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;backdrop-filter:blur(6px)}
.filter-btn:hover{color:var(--text2);border-color:rgba(255,255,255,0.2)}
.filter-btn.active{background:rgba(245,166,35,0.15);color:var(--gold);border-color:rgba(245,166,35,0.4);text-shadow:0 0 6px var(--gold-glow)}

/* DAY */
.day-section{margin-bottom:22px}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.day-label{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);text-shadow:0 0 8px var(--gold-glow)}
.day-count{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.day-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(245,166,35,0.3),transparent)}

/* MATCH CARD — FIFA panel */
.match-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius-lg);margin-bottom:8px;overflow:hidden;backdrop-filter:blur(12px);transition:border-color .15s,box-shadow .15s;position:relative}
.match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);pointer-events:none}
.match-card:hover{border-color:rgba(255,255,255,0.2);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.match-card.has-pred{border-left:3px solid var(--gold)}
.match-card.correct-exact{border-left:3px solid var(--gold);box-shadow:0 0 16px var(--gold-glow)}
.match-card.correct-result{border-left:3px solid var(--green2)}
.match-card.wrong{border-left:3px solid rgba(255,61,61,0.4)}
.match-card.live{border-left:3px solid var(--red);animation:pulse-live 2s infinite}
@keyframes pulse-live{0%,100%{box-shadow:0 4px 16px rgba(0,0,0,.3)}50%{box-shadow:0 4px 20px rgba(255,61,61,0.2)}}

/* MATCH TOP */
.match-top{padding:13px 16px}
.match-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.group-badge{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);background:rgba(0,0,0,0.4);border:1px solid var(--panel-border);padding:2px 8px;border-radius:3px}
.match-time-label{font-size:10px;color:var(--text3);margin-left:auto;letter-spacing:.5px}
.live-pill{font-size:9px;font-weight:700;background:var(--red);color:#fff;padding:2px 8px;border-radius:3px;letter-spacing:1px;text-transform:uppercase;animation:blink 1s infinite;margin-left:auto}

/* TEAMS */
.teams-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.team-name{font-size:16px;font-weight:700;color:var(--text);flex:1;letter-spacing:.5px}
.team-name.away{text-align:right}
.score-center{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:60px}
.score-vs{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.real-score-badge{font-size:12px;font-weight:700;color:var(--text2);background:rgba(0,0,0,0.4);border:1px solid var(--panel-border);padding:3px 10px;border-radius:4px;letter-spacing:1px}
.live-score-badge{font-size:12px;font-weight:700;color:var(--red);background:rgba(255,61,61,0.1);border:1px solid rgba(255,61,61,0.3);padding:3px 10px;border-radius:4px}
.pts-earned{font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:.5px;text-transform:uppercase}
.pts-earned.p5{background:rgba(245,166,35,0.15);color:var(--gold);border:1px solid rgba(245,166,35,0.3)}
.pts-earned.p3{background:rgba(0,184,90,0.12);color:var(--green2);border:1px solid rgba(0,184,90,0.25)}
.pts-earned.p0{background:rgba(255,61,61,0.1);color:var(--red);border:1px solid rgba(255,61,61,0.2)}

/* TWO COLUMNS */
.pred-columns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pred-col{border:1px solid var(--panel-border);border-radius:var(--radius);overflow:hidden;background:rgba(0,0,0,0.25)}
.pred-col-header{padding:7px 11px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--panel-border)}
.pred-col-header.mine{background:rgba(0,212,255,0.06);border-bottom-color:rgba(0,212,255,0.15)}
.pred-col-header.stats{background:rgba(179,136,255,0.06);border-bottom-color:rgba(179,136,255,0.15)}
.pred-col-icon{font-size:12px}
.pred-col-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.pred-col-title.mine{color:var(--cyan)}
.pred-col-title.stats{color:var(--purple)}
.pred-col-body{padding:10px 11px}

/* MY PREDICTION */
.my-pred-score{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--cyan);letter-spacing:3px;line-height:1;margin-bottom:4px;text-shadow:0 0 10px var(--cyan-glow)}
.my-pred-score.pending{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--text3);letter-spacing:1px;text-shadow:none;text-transform:uppercase}
.win-probs{display:flex;gap:3px;margin-top:6px}
.prob-seg{flex:1;text-align:center;padding:3px 2px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.5px}
.prob-seg.w{background:rgba(0,184,90,0.15);color:var(--green2);border:1px solid rgba(0,184,90,0.2)}
.prob-seg.d{background:rgba(255,255,255,0.05);color:var(--text3);border:1px solid var(--panel-border)}
.prob-seg.l{background:rgba(255,61,61,0.1);color:var(--red);border:1px solid rgba(255,61,61,0.15)}
.conf-row{display:flex;align-items:center;gap:6px;margin-top:5px}
.conf-label{font-size:9px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.conf-track{flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px}
.conf-fill.high{background:var(--green2);box-shadow:0 0 4px var(--green-glow)}
.conf-fill.med{background:var(--gold)}
.conf-fill.low{background:var(--red)}
.conf-pct{font-size:9px;font-weight:700;color:var(--text2);width:24px;text-align:right}

/* STATS PREDICTION */
.stat-rec-score{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--purple);letter-spacing:3px;line-height:1;margin-bottom:4px}
.stat-xg-row{display:flex;align-items:center;gap:5px;margin-top:5px}
.xg-tag{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.xg-num{font-size:10px;font-weight:700;color:var(--text2);flex-shrink:0}
.xg-bar-wrap{flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;display:flex}
.xg-home{height:100%;background:var(--cyan)}
.xg-away{height:100%;background:var(--red)}
.stat-options{display:flex;flex-direction:column;gap:2px;margin-top:6px}
.stat-opt{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:3px;border:1px solid transparent}
.stat-opt.best{background:rgba(179,136,255,0.08);border-color:rgba(179,136,255,0.2)}
.stat-opt-score{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--text);letter-spacing:1px;min-width:28px}
.stat-opt-bar-wrap{flex:1;height:2px;background:rgba(255,255,255,0.07);border-radius:1px;overflow:hidden}
.stat-opt-bar{height:100%;background:var(--purple);opacity:.7}
.stat-opt-prob{font-size:9px;color:var(--text3);min-width:26px;text-align:right}
.stat-opt-pts{font-size:9px;font-weight:700;color:var(--purple);min-width:32px;text-align:right}

/* RESULT INPUT */
.result-input-row{display:flex;align-items:center;gap:8px;padding:9px 16px;border-top:1px solid var(--panel-border);background:rgba(0,0,0,0.2);flex-wrap:wrap}
.result-label{font-size:10px;font-weight:700;color:var(--text3);white-space:nowrap;letter-spacing:1px;text-transform:uppercase}
.score-input{width:38px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius);color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:20px;text-align:center;padding:5px 0;outline:none;transition:border-color .2s}
.score-input:focus{border-color:var(--green2);box-shadow:0 0 0 2px var(--green-glow)}
.score-sep{font-size:16px;font-weight:700;color:var(--text3)}
.save-btn{font-size:11px;font-weight:700;padding:6px 14px;border-radius:var(--radius);border:none;background:linear-gradient(135deg,var(--green2),#006e35);color:#fff;cursor:pointer;transition:opacity .15s;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase}
.save-btn:hover{opacity:.85}
.clear-btn{font-size:11px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--panel-border);background:none;color:var(--text3);cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.clear-btn:hover{border-color:var(--red);color:var(--red)}
.auto-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;background:rgba(0,184,90,0.12);color:var(--green2);border:1px solid rgba(0,184,90,0.2);letter-spacing:.5px;text-transform:uppercase}

/* PENDING */
.pred-pending-row{display:flex;align-items:center;gap:8px;padding:9px 16px;border-top:1px solid var(--panel-border);background:rgba(245,166,35,0.04);flex-wrap:wrap}
.pred-pending-label{font-size:11px;color:rgba(245,166,35,0.5);flex:1;letter-spacing:.5px}
.set-pred-btn{font-size:11px;font-weight:700;padding:6px 14px;border-radius:var(--radius);border:1px solid rgba(245,166,35,0.3);background:rgba(245,166,35,0.08);color:var(--gold);cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase}
.set-pred-btn:hover{background:rgba(245,166,35,0.15)}

/* DETAIL */
.detail-toggle{display:flex;align-items:center;gap:4px;padding:7px 16px;border-top:1px solid var(--panel-border);cursor:pointer;font-size:10px;font-weight:700;color:var(--text3);background:none;border:none;width:100%;text-align:left;border-top:1px solid var(--panel-border);font-family:'Barlow Condensed',sans-serif;transition:color .15s;letter-spacing:1px;text-transform:uppercase}
.detail-toggle:hover{color:var(--text2)}
.dtgl-icon{transition:transform .2s;font-size:10px}
.dtgl-icon.open{transform:rotate(180deg)}
.match-detail{display:none;padding:13px 16px;border-top:1px solid var(--panel-border);background:rgba(0,0,0,0.2)}
.match-detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px}
.detail-subtitle{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:6px}
.tactic-text{font-size:12px;color:var(--text2);line-height:1.65}
.tag-list{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:500;letter-spacing:.3px}
.tag.key{background:rgba(0,212,255,0.08);color:var(--cyan2);border:1px solid rgba(0,212,255,0.15)}
.tag.warn{background:rgba(245,166,35,0.08);color:var(--gold2);border:1px solid rgba(245,166,35,0.2)}
.tag.player{background:rgba(255,255,255,0.05);color:var(--text2);border:1px solid var(--panel-border)}
.detail-full{grid-column:1/-1}

/* GROUPS */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:10px}
.group-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius-lg);overflow:hidden;backdrop-filter:blur(10px)}
.group-card-header{background:linear-gradient(135deg,rgba(245,166,35,0.15),rgba(245,166,35,0.05));padding:9px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(245,166,35,0.15)}
.group-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);text-shadow:0 0 8px var(--gold-glow)}
.group-table{width:100%;border-collapse:collapse;font-size:12px}
.group-table th{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);padding:5px 12px;text-align:center;border-bottom:1px solid var(--panel-border);font-weight:700;background:rgba(0,0,0,0.2)}
.group-table th:first-child,.group-table th:nth-child(2){text-align:left}
.group-table td{padding:7px 12px;text-align:center;color:var(--text3);border-bottom:1px solid rgba(255,255,255,0.04)}
.group-table td:first-child{font-size:10px;width:26px}
.group-table td.team-col{text-align:left;color:var(--text);font-weight:600;letter-spacing:.3px}
.group-table tr:last-child td{border-bottom:none}
.qualify-row td{background:rgba(0,184,90,0.05)}
.qualify-dot{width:6px;height:6px;border-radius:50%;background:var(--green2);display:inline-block;margin-right:5px;box-shadow:0 0 4px var(--green-glow)}

/* SCORE TAB */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:8px;margin-bottom:18px}
.stat-card{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius-lg);padding:14px;text-align:center;backdrop-filter:blur(8px)}
.stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:6px}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:var(--text)}
.stat-value.gold{color:var(--gold);text-shadow:0 0 12px var(--gold-glow)}
.stat-sub{font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:.5px}
.history-row{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius);margin-bottom:6px;backdrop-filter:blur(8px)}
.history-ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.history-match{flex:1;font-size:13px;font-weight:600;color:var(--text);letter-spacing:.3px}
.history-pred{font-size:11px;color:var(--text3);font-family:monospace}
.history-real{font-size:11px;font-weight:700;color:var(--text);font-family:monospace;margin:0 6px}
.history-pts{font-family:'Bebas Neue',sans-serif;font-size:20px;min-width:36px;text-align:right}

.loading-msg{text-align:center;padding:40px;color:var(--text3);font-size:12px;letter-spacing:1px;text-transform:uppercase}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--panel-border);color:var(--text);padding:9px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;backdrop-filter:blur(12px);letter-spacing:.5px}
.toast.show{opacity:1}

@media(max-width:640px){
  .pred-columns{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .main{padding:14px}
  .match-top{padding:11px}
  .header-inner{height:50px}
  .logo-text{font-size:17px}
}
</style>
</head>

const LS_KEY='mundial2026_quiniela_v3';
let state={results:{},preds:{},lastSync:null,live:{}};
function loadState(){try{const s=localStorage.getItem(LS_KEY);if(s)state=JSON.parse(s);}catch(e){}}
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function parseScore(s){if(!s)return null;const p=s.split('-');if(p.length!==2)return null;const a=parseInt(p[0]),b=parseInt(p[1]);if(isNaN(a)||isNaN(b))return null;return{h:a,a:b};}
function scoreResult(s){const p=parseScore(s);if(!p)return null;return p.h>p.a?'W':p.h<p.a?'L':'D';}
function calcPoints(pred,real){if(!pred||!real)return 0;if(pred===real)return 8;const pr=scoreResult(pred),rr=scoreResult(real);if(pr&&rr&&pr===rr)return 3;return 0;}
function getMeta(m){return{pred:m.pred,conf:m.conf,winPct:m.winPct,drawPct:m.drawPct,lossPct:m.lossPct,players:m.players,keys:m.keys,warns:m.warns,tactic:m.tactic,real:state.results[m.id]||null,live:state.live?state.live[m.id]:null};}
function totalPts(){return MATCHES.reduce((s,m)=>{const{pred,real}=getMeta(m);return s+calcPoints(pred,real);},0);}
function analyzedCount(){return MATCHES.filter(m=>getMeta(m).pred).length;}
function confClass(c){return c>=65?'high':c>=50?'med':'low';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ─── SYNC ────────────────────────────────────────────────────────────────────
let syncing=false;
async function syncResults(){
  if(syncing)return;syncing=true;
  const btn=document.getElementById('sync-btn'),dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  btn.classList.add('syncing');btn.textContent='⟳ Sincronizando...';dot.className='sync-dot loading';txt.textContent='Consultando resultados...';
  try{
    const res=await fetch('https://worldcup26.ir/get/games');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const games=await res.json();
    let updated=0;const liveMap={};
    const gameList=Array.isArray(games)?games:(games.data||games.games||games.matches||[]);
    gameList.forEach(g=>{
      // Try multiple field name formats
      const homeN=norm(g.home_team||g.homeTeam||g.home||g.team_home||'');
      const awayN=norm(g.away_team||g.awayTeam||g.away||g.team_away||'');
      if(!homeN||!awayN)return;
      const match=MATCHES.find(m=>m.home===homeN&&m.away===awayN);
      if(!match)return;
      const hS=g.home_score??g.homeScore??g.score_home??g.goals_home??null;
      const aS=g.away_score??g.awayScore??g.score_away??g.goals_away??null;
      const status=g.status||g.state||g.match_status||'';
      const isDone=['FT','finished','FINISHED','completed','COMPLETED','full_time'].includes(status)||g.finished===true;
      const isLive=['LIVE','live','1H','2H','HT','ET'].includes(status)||g.live===true;
      if(isDone&&hS!==null&&aS!==null){
        const ns=`${hS}-${aS}`;
        if(state.results[match.id]!==ns){state.results[match.id]=ns;updated++;}
      }
      if(isLive&&hS!==null&&aS!==null)liveMap[match.id]=`${hS}-${aS}`;
    });
    state.live=liveMap;state.lastSync=new Date().toISOString();saveState();
    const now=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
    dot.className='sync-dot ok';
    txt.textContent=`Sincronizado ${now} · ${updated} resultado${updated!==1?'s':''} actualizado${updated!==1?'s':''}.`;
    updateHeader();renderMatches();renderBanner();if(activeTab==='grupos')renderGroups();
  }catch(err){
    // Fallback to TheSportsDB
    try{
      const res2=await fetch('https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=4429&s=2026');
      if(!res2.ok)throw new Error('fallback failed');
      const data=await res2.json();const events=data.events||[];
      let updated=0;const liveMap={};
      events.forEach(ev=>{
        const homeN=norm(ev.strHomeTeam),awayN=norm(ev.strAwayTeam);
        const match=MATCHES.find(m=>m.home===homeN&&m.away===awayN);if(!match)return;
        const hS=ev.intHomeScore,aS=ev.intAwayScore,status=ev.strStatus||'';
        const isLive=['HT','1H','2H','ET','PT'].includes(status),isDone=['FT','AET','PEN'].includes(status);
        if(isDone&&hS!==null&&hS!==''&&aS!==null&&aS!==''){const ns=`${hS}-${aS}`;if(state.results[match.id]!==ns){state.results[match.id]=ns;updated++;}}
        if(isLive&&hS!==null&&aS!==null)liveMap[match.id]=`${hS}-${aS}`;
      });
      state.live=liveMap;state.lastSync=new Date().toISOString();saveState();
      const now=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
      dot.className='sync-dot ok';txt.textContent=`Sincronizado ${now} · ${updated} resultado${updated!==1?'s':''} actualizado${updated!==1?'s':''}.`;
      updateHeader();renderMatches();renderBanner();if(activeTab==='grupos')renderGroups();
    }catch(err2){dot.className='sync-dot err';txt.textContent='Sin conexión — ingresa resultados manualmente.';}
  }
  btn.classList.remove('syncing');btn.textContent='⟳ Sincronizar';syncing=false;
}

// ─── BANNER ──────────────────────────────────────────────────────────────────
const SESSIONS=[{date:'2026-06-19',label:'Jueves 19 jun',days:'18 al 21 de junio',count:16},{date:'2026-06-23',label:'Lunes 23 jun',days:'22 al 27 de junio',count:32}];
function renderBanner(){
  const banner=document.getElementById('reminder-banner'),icon=document.getElementById('reminder-icon'),title=document.getElementById('reminder-title'),sub=document.getElementById('reminder-sub');
  const now=new Date(),today=now.toISOString().slice(0,10);
  if(state.live&&Object.keys(state.live).length>0){banner.className='reminder-banner playing';banner.style.display='flex';icon.textContent='🔴';title.textContent='Partidos en vivo';sub.textContent='Presiona Sincronizar para ver los marcadores en tiempo real.';return;}
  const next=SESSIONS.find(s=>s.date>=today);if(!next){banner.style.display='none';return;}
  const diffDays=Math.ceil((new Date(next.date+'T12:00:00')-now)/(1000*60*60*24));
  const pending=MATCHES.filter(m=>!getMeta(m).pred&&m.date>today).length;
  if(pending===0){banner.style.display='none';return;}
  if(diffDays<=0){banner.className='reminder-banner urgent';banner.style.display='flex';icon.textContent='⚡';title.textContent=`Hoy toca analizar — ${next.label}`;sub.textContent=`Entra a Claude · ${next.count} partidos del ${next.days} sin pronóstico.`;}
  else if(diffDays===1){banner.className='reminder-banner urgent';banner.style.display='flex';icon.textContent='⏰';title.textContent=`Mañana toca analizar — ${next.label}`;sub.textContent=`${pending} partidos pendientes (${next.days}).`;}
  else if(diffDays<=3){banner.className='reminder-banner soon';banner.style.display='flex';icon.textContent='📅';title.textContent=`Análisis en ${diffDays} días — ${next.label}`;sub.textContent=`${pending} partidos pendientes (${next.days}).`;}
  else{banner.style.display='none';}
}

let openDetails={};
function renderMatches(){
  const c=document.getElementById('matches-container');

  const days=[...new Set(ms.map(m=>m.day))];
  c.innerHTML=days.map(day=>{

  }).join('');
}

function renderCard(m){
  const{pred,conf,winPct,drawPct,lossPct,players,keys,warns,tactic,real,live}=getMeta(m);
  const hasPred=!!pred,hasReal=!!real,pts=calcPoints(pred,real),open=openDetails[m.id]||false,isLive=!!live;
  let cls='match-card';
  if(isLive)cls+=' live';
  else if(hasPred&&hasReal){if(pts===8)cls+=' correct-exact';else if(pts===3)cls+=' correct-result';else cls+=' wrong';}
  else if(hasPred)cls+=' has-pred';

  const sd=getSD(m.home,m.away);
  const maxP=sd?Math.max(...sd.top_scores.map(s=>s.prob)):1;

  let realHtml='';
  if(hasReal)realHtml=`<span class="real-score-badge">${real}</span>`;
  else if(isLive)realHtml=`<span class="live-score-badge">${live}</span>`;
  let ptsHtml='';
  if(hasReal&&hasPred){if(pts===8)ptsHtml=`<span class="pts-earned p5">★ +8</span>`;else if(pts===3)ptsHtml=`<span class="pts-earned p3">✓ +3</span>`;else ptsHtml=`<span class="pts-earned p0">✗ 0</span>`;}

  const myCol=hasPred?`
    <div class="my-pred-score">${pred}</div>
    ${winPct!=null?`<div class="win-probs"><div class="prob-seg w">${winPct}%</div><div class="prob-seg d">${drawPct}%</div><div class="prob-seg l">${lossPct}%</div></div>`:''}
    ${conf?`<div class="conf-row"><span class="conf-label">Confianza</span><div class="conf-track"><div class="conf-fill ${confClass(conf)}" style="width:${conf}%"></div></div><span class="conf-pct">${conf}%</span></div>`:''}
  `:`<div class="my-pred-score pending">Pendiente de análisis</div>`;

  const statsCol=sd?`
    <div class="stat-rec-score">${sd.recommend}</div>
    <div class="stat-xg-row"><span class="xg-tag">xG</span><span class="xg-num">${sd.xg_h}</span><div class="xg-bar-wrap"><div class="xg-home" style="width:${Math.round(sd.xg_h/(sd.xg_h+sd.xg_a)*100)}%"></div><div class="xg-away" style="width:${Math.round(sd.xg_a/(sd.xg_h+sd.xg_a)*100)}%"></div></div><span class="xg-num">${sd.xg_a}</span></div>
    <div class="stat-options">${sd.top_scores.map((s,i)=>`<div class="stat-opt${i===0?' best':''}"><span class="stat-opt-score">${s.score}</span><div class="stat-opt-bar-wrap"><div class="stat-opt-bar" style="width:${Math.round(s.prob/maxP*100)}%"></div></div><span class="stat-opt-prob">${s.prob}%</span><span class="stat-opt-pts">${s.e_pts}p</span></div>`).join('')}</div>
  `:`<div style="font-size:11px;color:var(--text3);padding:6px 0;letter-spacing:.5px">Sin datos estadísticos</div>`;

  const detailHtml=hasPred?`<div class="match-detail${open?' open':''}" id="detail-${m.id}">
    <div class="detail-grid">
      <div><div class="detail-subtitle">Jugadores clave</div><div class="tag-list">${(players||[]).map(p=>`<span class="tag player">${p}</span>`).join('')}</div>
      ${(keys||[]).length?`<div class="detail-subtitle" style="margin-top:10px">Factores</div><div class="tag-list">${keys.map(k=>`<span class="tag key">${k}</span>`).join('')}</div>`:''}
      </div>
      <div>${(warns||[]).length?`<div class="detail-subtitle">Alertas</div><div class="tag-list">${warns.map(w=>`<span class="tag warn">⚠ ${w}</span>`).join('')}</div>`:''}
      </div>
      ${tactic?`<div class="detail-full"><div class="detail-subtitle">Táctica esperada</div><div class="tactic-text">${tactic}</div></div>`:''}
    </div></div>`:'';

  const inputHtml=hasPred?`<div class="result-input-row">
    <span class="result-label">Resultado real</span>
    <input class="score-input" id="rh-${m.id}" type="number" min="0" max="20" placeholder="0" value="${real?parseScore(real).h:''}">
    <span class="score-sep">–</span>
    <input class="score-input" id="ra-${m.id}" type="number" min="0" max="20" placeholder="0" value="${real?parseScore(real).a:''}">
    <button class="save-btn" onclick="saveResult(${m.id})">Guardar</button>
    ${hasReal?`<button class="clear-btn" onclick="clearResult(${m.id})">✕</button><span class="auto-badge">auto-sync ✓</span>`:''}
    </div>`:`<div class="pred-pending-row"><span class="pred-pending-label">⏳ Pendiente de análisis con Claude</span><button class="set-pred-btn" onclick="openPredInput(${m.id})">Ingresar</button></div>`;

  return`<div class="${cls}" id="card-${m.id}">
    <div class="match-top">
      <div class="match-meta">
        <span class="group-badge">Grupo ${m.group}</span>
        ${isLive?`<span class="live-pill">En Vivo</span>`:`<span class="match-time-label">${m.time} · CDMX</span>`}

    ${inputHtml}
  </div>`;
}

// ─── GROUPS ──────────────────────────────────────────────────────────────────
function computeStandings(grp){const teams=GROUPS[grp],s={};teams.forEach(t=>{s[t]={pts:0,gf:0,ga:0,pj:0}});MATCHES.filter(m=>m.group===grp).forEach(m=>{const r=state.results[m.id];if(!r)return;const p=parseScore(r);if(!p)return;s[m.home].pj++;s[m.away].pj++;s[m.home].gf+=p.h;s[m.home].ga+=p.a;s[m.away].gf+=p.a;s[m.away].ga+=p.h;if(p.h>p.a)s[m.home].pts+=3;else if(p.h<p.a)s[m.away].pts+=3;else{s[m.home].pts++;s[m.away].pts++;}});return teams.map(t=>({t,...s[t],dg:s[t].gf-s[t].ga})).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);}
function renderGroups(){document.getElementById('groups-container').innerHTML=Object.keys(GROUPS).map(g=>{const rows=computeStandings(g);return`<div class="group-card"><div class="group-card-header"><div class="group-name">Grupo ${g}</div></div><table class="group-table"><thead><tr><th>#</th><th>Selección</th><th>PJ</th><th>DG</th><th>Pts</th></tr></thead><tbody>${rows.map((r,i)=>`<tr class="${i<2?'qualify-row':''}"><td>${i<2?`<span class="qualify-dot"></span>`:i+1}</td><td class="team-col">${r.t}</td><td>${r.pj}</td><td>${r.dg>0?'+'+r.dg:r.dg}</td><td style="font-weight:700;color:${i<2?'var(--green2)':'var(--text)'}">${r.pts}</td></tr>`).join('')}</tbody></table></div>`;}).join('');}

// ─── SCORE TAB ───────────────────────────────────────────────────────────────
function renderScore(){
  const played=MATCHES.filter(m=>getMeta(m).real),cr=played.filter(m=>calcPoints(getMeta(m).pred,getMeta(m).real)>=3),ex=played.filter(m=>calcPoints(getMeta(m).pred,getMeta(m).real)===8);
  document.getElementById('stats-grid').innerHTML=`<div class="stat-card"><div class="stat-label">Puntos</div><div class="stat-value gold">${totalPts()}</div></div><div class="stat-card"><div class="stat-label">Jugados</div><div class="stat-value">${played.length}</div><div class="stat-sub">de 72</div></div><div class="stat-card"><div class="stat-label">Resultados ✓</div><div class="stat-value">${cr.length}</div><div class="stat-sub">× 3 pts</div></div><div class="stat-card"><div class="stat-label">Exactos ★</div><div class="stat-value gold">${ex.length}</div><div class="stat-sub">× 2 extra</div></div>`;
  const det=document.getElementById('score-detail');
  if(!played.length){det.innerHTML=`<div class="loading-msg">Los resultados aparecerán aquí conforme avance el torneo</div>`;return;}
  det.innerHTML=played.map(m=>{const{pred,real}=getMeta(m),pts=calcPoints(pred,real),ico=pts===8?'★':pts===3?'✓':'✗',col=pts===8?'var(--gold)':pts===3?'var(--green2)':'var(--red)';return`<div class="history-row"><span class="history-ico" style="color:${col}">${ico}</span><span class="history-match">${m.home} vs ${m.away}</span><span class="history-pred">Pred: ${pred}</span><span class="history-real">${real}</span><span class="history-pts" style="color:${col}">+${pts}</span></div>`;}).join('');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function initApp(){loadState();renderFilters();renderMatches();updateHeader();renderBanner();setTimeout(syncResults,600);}
</script>
