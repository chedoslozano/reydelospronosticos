<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pitch:#1a7a3a;--pitch-dark:#155f2d;--pitch-line:rgba(255,255,255,0.08);
  --surface:#ffffff;--surface-alt:#f7f8fa;--surface-dark:#1c2333;
  --border:#e4e7ed;--border-dark:#2e3a4e;
  --gold:#f5a623;--gold-light:#fef3dc;--gold-dark:#c47d0e;
  --blue:#1a56db;--blue-light:#ebf0ff;--blue-dark:#1139a0;
  --green:#0e9f6e;--green-light:#e6f9f2;--green-dark:#057a55;
  --red:#e02424;--red-light:#fde8e8;--red-dark:#9b1c1c;
  --purple:#7e3af2;--purple-light:#edebff;
  --text:#111827;--text-2:#374151;--text-3:#6b7280;--text-4:#9ca3af;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
}

body{background:var(--surface-alt);color:var(--text);font-family:'Figtree',sans-serif;font-size:14px;min-height:100vh}

/* ── PASSWORD ── */
#password-screen{position:fixed;inset:0;z-index:1000;background:linear-gradient(135deg,var(--pitch-dark) 0%,var(--pitch) 60%,#2d9e55 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.pw-wrap{background:rgba(255,255,255,.97);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;text-align:center;box-shadow:0 24px 48px rgba(0,0,0,.25)}
.pw-badge{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--pitch),var(--pitch-dark));display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
.pw-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.pw-sub{font-size:13px;color:var(--text-3);margin-bottom:28px}
.pw-field{width:100%;padding:13px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:16px;font-family:'Figtree',sans-serif;outline:none;transition:border-color .2s;text-align:center;letter-spacing:3px;color:var(--text)}
.pw-field:focus{border-color:var(--pitch)}
.pw-btn{width:100%;margin-top:12px;padding:13px;font-family:'Figtree',sans-serif;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--pitch),var(--pitch-dark));border:none;border-radius:var(--radius-sm);color:#fff;cursor:pointer;transition:opacity .2s}
.pw-btn:hover{opacity:.9}
.pw-error{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}
.pw-hint{font-size:11px;color:var(--text-4);margin-top:16px}

/* ── HEADER ── */
#main-app{display:none}
.app-header{background:linear-gradient(135deg,var(--surface-dark) 0%,#2e3a4e 100%);padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:62px;gap:16px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:24px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;line-height:1}
.logo-sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:1.5px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-chip{font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;white-space:nowrap}
.hdr-chip.gold{background:rgba(245,166,35,.15);color:var(--gold);border:1px solid rgba(245,166,35,.3)}
.hdr-chip.blue{background:rgba(26,86,219,.15);color:#60a5fa;border:1px solid rgba(26,86,219,.3)}
.sync-btn{font-size:12px;font-weight:600;padding:7px 14px;border-radius:var(--radius-xs);border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Figtree',sans-serif}
.sync-btn:hover{background:rgba(255,255,255,.15)}
.sync-btn.syncing{color:var(--gold);border-color:rgba(245,166,35,.4)}

/* ── NAV ── */
.nav-tabs{background:var(--surface-dark);border-bottom:1px solid var(--border-dark);padding:0 24px}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-tab{font-size:13px;font-weight:600;padding:13px 18px;border:none;background:none;color:rgba(255,255,255,.45);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:.3px;transition:all .15s;font-family:'Figtree',sans-serif}
.nav-tab:hover{color:rgba(255,255,255,.75)}
.nav-tab.active{color:#fff;border-bottom-color:var(--gold)}

/* ── MAIN ── */
.main{max-width:1100px;margin:0 auto;padding:20px 24px}

/* ── BANNER ── */
.reminder-banner{display:none;align-items:center;gap:12px;padding:13px 16px;border-radius:var(--radius-sm);margin-bottom:16px;border:1px solid}
.reminder-banner.urgent{background:#fffbeb;border-color:#fcd34d;color:#92400e}
.reminder-banner.soon{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
.reminder-banner.playing{background:#fdf2f8;border-color:#f0abfc;color:#701a75}
.reminder-icon{font-size:20px;flex-shrink:0}
.reminder-body{flex:1}
.reminder-title{font-weight:700;font-size:13px;margin-bottom:2px}
.reminder-sub{font-size:12px;opacity:.85;line-height:1.5}
.reminder-cta{font-size:12px;font-weight:600;padding:6px 14px;border-radius:var(--radius-xs);border:1px solid currentColor;background:none;color:inherit;cursor:pointer;font-family:'Figtree',sans-serif;white-space:nowrap;text-decoration:none;display:inline-block}

/* ── SYNC STATUS ── */
.sync-status{font-size:12px;padding:9px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-3);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-4);flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.loading{background:var(--gold);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── FILTER ── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{font-size:12px;font-weight:500;padding:6px 13px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text-3);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Figtree',sans-serif}
.filter-btn:hover{border-color:var(--text-3);color:var(--text-2)}
.filter-btn.active{background:var(--pitch);color:#fff;border-color:var(--pitch);font-weight:600}

/* ── DAY SECTION ── */
.day-section{margin-bottom:24px}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.day-pill{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:var(--pitch-dark);background:var(--green-light);border:1px solid rgba(14,159,110,.2);padding:3px 12px;border-radius:999px}
.day-count{font-size:11px;color:var(--text-4);font-weight:500}
.day-line{flex:1;height:1px;background:var(--border)}

/* ── MATCH CARD ── */
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:box-shadow .15s,border-color .15s;box-shadow:var(--shadow)}
.match-card:hover{box-shadow:var(--shadow-md);border-color:#d1d5db}
.match-card.has-pred{border-left:4px solid var(--gold)}
.match-card.correct-exact{border-left:4px solid var(--gold);background:linear-gradient(135deg,var(--gold-light),var(--surface))}
.match-card.correct-result{border-left:4px solid var(--green)}
.match-card.wrong{border-left:4px solid var(--red-light)}
.match-card.live{border-left:4px solid var(--red);animation:pulse-live 2s infinite}
@keyframes pulse-live{0%,100%{box-shadow:var(--shadow)}50%{box-shadow:0 0 0 3px rgba(224,36,36,.1),var(--shadow)}}

/* ── MATCH TOP ── */
.match-top{padding:14px 16px}
.match-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.group-badge{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-3);background:var(--surface-alt);border:1px solid var(--border);padding:2px 8px;border-radius:999px}
.match-time-label{font-size:11px;color:var(--text-4);margin-left:auto}
.live-pill{font-size:10px;font-weight:700;background:var(--red);color:#fff;padding:2px 8px;border-radius:999px;letter-spacing:.5px;animation:blink 1s infinite}

/* ── TEAMS ROW ── */
.teams-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.team-name{font-size:15px;font-weight:700;color:var(--text);flex:1}
.team-name.away{text-align:right}
.score-center{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:64px}
.score-vs{font-size:11px;color:var(--text-4);font-weight:500}
.real-score-badge{font-size:11px;font-weight:600;color:var(--text-3);background:var(--surface-alt);border:1px solid var(--border);padding:2px 8px;border-radius:6px}
.live-score-badge{font-size:11px;font-weight:700;color:var(--red);background:var(--red-light);border:1px solid rgba(224,36,36,.2);padding:2px 8px;border-radius:6px}
.pts-earned{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px}
.pts-earned.p5{background:var(--gold-light);color:var(--gold-dark)}
.pts-earned.p3{background:var(--green-light);color:var(--green-dark)}
.pts-earned.p0{background:var(--red-light);color:var(--red-dark)}

/* ── TWO COLUMN PREDICTIONS ── */
.pred-columns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:0}
.pred-col{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.pred-col-header{padding:7px 12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border)}
.pred-col-header.mine{background:linear-gradient(135deg,#f0f9ff,#e0f2fe)}
.pred-col-header.stats{background:linear-gradient(135deg,#f5f3ff,#ede9fe)}
.pred-col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.pred-col-title.mine{color:var(--blue-dark)}
.pred-col-title.stats{color:var(--purple)}
.pred-col-icon{font-size:13px}
.pred-col-body{padding:10px 12px}

/* MY PREDICTION */
.my-pred-score{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--blue);letter-spacing:2px;line-height:1;margin-bottom:4px}
.my-pred-score.pending{font-family:'Figtree',sans-serif;font-size:12px;color:var(--text-4);letter-spacing:0}
.conf-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.conf-label{font-size:10px;color:var(--text-4);white-space:nowrap}
.conf-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px}
.conf-fill.high{background:var(--green)}
.conf-fill.med{background:var(--gold)}
.conf-fill.low{background:var(--red)}
.conf-pct{font-size:10px;font-weight:600;color:var(--text-3);width:28px;text-align:right}
.win-probs{display:flex;gap:3px;margin-top:6px}
.prob-seg{flex:1;text-align:center;padding:3px 2px;border-radius:4px;font-size:9px;font-weight:600}
.prob-seg.w{background:var(--green-light);color:var(--green-dark)}
.prob-seg.d{background:#f3f4f6;color:var(--text-3)}
.prob-seg.l{background:var(--red-light);color:var(--red-dark)}

/* STATS PREDICTION */
.stat-rec-score{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--purple);letter-spacing:2px;line-height:1;margin-bottom:4px}
.stat-options{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.stat-option{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:5px;cursor:pointer;transition:background .15s}
.stat-option:hover{background:var(--surface-alt)}
.stat-option.best{background:var(--purple-light)}
.stat-option-score{font-size:12px;font-weight:700;color:var(--text);min-width:30px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
.stat-option-bar-wrap{flex:1}
.stat-option-bar{height:3px;border-radius:2px;background:var(--purple);opacity:.6}
.stat-option-prob{font-size:10px;color:var(--text-4);min-width:28px;text-align:right}
.stat-option-pts{font-size:10px;font-weight:600;color:var(--purple);min-width:36px;text-align:right}
.stat-xg{display:flex;align-items:center;gap:4px;margin-top:6px}
.xg-label{font-size:9px;color:var(--text-4);text-transform:uppercase;letter-spacing:.5px}
.xg-val{font-size:10px;font-weight:600;color:var(--text-2)}
.xg-bar-wrap{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;display:flex}
.xg-home{height:100%;background:var(--blue)}
.xg-away{height:100%;background:var(--red)}

/* RESULT INPUT */
.result-input-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--surface-alt);flex-wrap:wrap}
.result-label{font-size:11px;font-weight:600;color:var(--text-3);white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
.score-input{width:40px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-xs);color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:20px;text-align:center;padding:5px 0;outline:none;transition:border-color .2s}
.score-input:focus{border-color:var(--pitch)}
.score-sep{font-size:16px;font-weight:700;color:var(--text-3)}
.save-btn{font-size:12px;font-weight:600;padding:7px 16px;border-radius:var(--radius-xs);border:none;background:var(--pitch);color:#fff;cursor:pointer;transition:opacity .15s;font-family:'Figtree',sans-serif}
.save-btn:hover{opacity:.85}
.clear-btn{font-size:12px;font-weight:500;padding:7px 10px;border-radius:var(--radius-xs);border:1px solid var(--border);background:none;color:var(--text-3);cursor:pointer;font-family:'Figtree',sans-serif}
.clear-btn:hover{border-color:var(--red);color:var(--red)}
.auto-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px;background:var(--green-light);color:var(--green-dark);border:1px solid rgba(14,159,110,.2)}

/* PRED PENDING */
.pred-pending-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--gold-light)}
.pred-pending-label{font-size:12px;color:var(--gold-dark);font-weight:500;flex:1}
.set-pred-btn{font-size:12px;font-weight:600;padding:7px 14px;border-radius:var(--radius-xs);border:1px solid var(--gold);background:var(--gold-light);color:var(--gold-dark);cursor:pointer;font-family:'Figtree',sans-serif}
.set-pred-btn:hover{background:var(--gold);color:#fff}

/* EXPAND DETAIL */
.detail-toggle{display:flex;align-items:center;gap:4px;padding:7px 16px;border-top:1px solid var(--border);cursor:pointer;font-size:11px;font-weight:600;color:var(--text-3);background:none;border:none;width:100%;text-align:left;border-top:1px solid var(--border);font-family:'Figtree',sans-serif;transition:color .15s}
.detail-toggle:hover{color:var(--pitch)}
.detail-toggle-icon{transition:transform .2s;font-size:10px}
.detail-toggle-icon.open{transform:rotate(180deg)}
.match-detail{display:none;padding:14px 16px;border-top:1px solid var(--border);background:var(--surface-alt)}
.match-detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px}
.detail-block{}
.detail-subtitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-3);margin-bottom:6px}
.tactic-text{font-size:12px;color:var(--text-2);line-height:1.7}
.tag-list{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--text-3);font-weight:500}
.tag.key{border-color:#bfdbfe;color:var(--blue-dark);background:var(--blue-light)}
.tag.warn{border-color:#fed7aa;color:#92400e;background:#fffbeb}
.tag.player{border-color:var(--border);color:var(--text-2);background:var(--surface)}
.detail-full{grid-column:1/-1}

/* ── GROUPS TAB ── */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.group-card-header{background:linear-gradient(135deg,var(--pitch-dark),var(--pitch));padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.group-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;color:#fff}
.group-table{width:100%;border-collapse:collapse;font-size:12px}
.group-table th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-4);padding:6px 12px;text-align:center;border-bottom:1px solid var(--border);font-weight:700;background:var(--surface-alt)}
.group-table th:first-child,.group-table th:nth-child(2){text-align:left}
.group-table td{padding:8px 12px;text-align:center;color:var(--text-3);border-bottom:1px solid var(--border)}
.group-table td:first-child{font-size:11px;width:28px}
.group-table td.team-col{text-align:left;color:var(--text);font-weight:600}
.group-table tr:last-child td{border-bottom:none}
.qualify-row td{background:rgba(14,159,110,.04)}
.qualify-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px}

/* ── SCORE TAB ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center;box-shadow:var(--shadow)}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-3);margin-bottom:6px}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:var(--text)}
.stat-value.gold{color:var(--gold)}
.stat-sub{font-size:11px;color:var(--text-4);margin-top:3px}
.history-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:7px;box-shadow:var(--shadow)}
.history-ico{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.history-match{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.history-pred{font-size:11px;color:var(--text-3);font-family:monospace}
.history-real{font-size:11px;font-weight:600;color:var(--text);font-family:monospace;margin:0 4px}
.history-pts{font-family:'Bebas Neue',sans-serif;font-size:20px;min-width:40px;text-align:right}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:var(--shadow-md)}
.toast.show{opacity:1}

.loading-msg{text-align:center;padding:40px;color:var(--text-3);font-size:13px}

@media(max-width:640px){
  .pred-columns{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .main{padding:16px}
  .match-top{padding:12px}
}
</style>
</head>
<body>

<!-- PASSWORD -->
<div id="password-screen">
  <div class="pw-wrap">
    <div class="pw-badge">⚽</div>
    <div class="pw-title">Mundial 2026</div>
    <div class="pw-sub">Quiniela privada · Solo invitados</div>
    <input class="pw-field" id="pw-input" type="password" placeholder="••••••" autocomplete="off" onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="pw-btn" onclick="checkPassword()">Entrar →</button>
    <div class="pw-error" id="pw-error"></div>
    <div class="pw-hint">🏆 EasyFútbol · Fase de grupos</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <div class="app-header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⚽</div>
        <div>
          <div class="logo-text">Mundial 2026</div>
          <div class="logo-sub">Quiniela · Fase de grupos</div>
        </div>
      </div>
      <div class="header-right">
        <button class="sync-btn" id="sync-btn" onclick="syncResults()">⟳ Sincronizar</button>

const LS_KEY='mundial2026_quiniela_v3';
let state={results:{},preds:{},lastSync:null,live:{}};
function loadState(){try{const s=localStorage.getItem(LS_KEY);if(s)state=JSON.parse(s);}catch(e){}}
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function parseScore(s){if(!s)return null;const p=s.split('-');if(p.length!==2)return null;const a=parseInt(p[0]),b=parseInt(p[1]);if(isNaN(a)||isNaN(b))return null;return{h:a,a:b};}
function scoreResult(s){const p=parseScore(s);if(!p)return null;return p.h>p.a?'W':p.h<p.a?'L':'D';}
function calcPoints(pred,real){
  // 3 pts result + 2 pts exact score = 5 max
  if(!pred||!real)return 0;
  if(pred===real)return 5;
  const pr=scoreResult(pred),rr=scoreResult(real);
  if(pr&&rr&&pr===rr)return 3;
  return 0;
}
function getMeta(m){const sp=state.preds[m.id]||{};return{pred:sp.pred!==undefined?sp.pred:m.pred,conf:sp.conf!==undefined?sp.conf:m.conf,winPct:sp.winPct!==undefined?sp.winPct:m.winPct,drawPct:sp.drawPct!==undefined?sp.drawPct:m.drawPct,lossPct:sp.lossPct!==undefined?sp.lossPct:m.lossPct,players:sp.players||m.players,keys:sp.keys||m.keys,warns:sp.warns||m.warns,tactic:sp.tactic!==undefined?sp.tactic:m.tactic,real:state.results[m.id]||null,live:state.live?state.live[m.id]:null};}
function totalPts(){return MATCHES.reduce((s,m)=>{const{pred,real}=getMeta(m);return s+calcPoints(pred,real);},0);}
function analyzedCount(){return MATCHES.filter(m=>getMeta(m).pred).length;}
function confClass(c){return c>=65?'high':c>=50?'med':'low';}

// ─── SYNC ────────────────────────────────────────────────────────────────────
let syncing=false;
async function syncResults(){
  if(syncing)return;syncing=true;
  const btn=document.getElementById('sync-btn'),dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  btn.classList.add('syncing');btn.textContent='⟳ Sincronizando...';dot.className='sync-dot loading';txt.textContent='Consultando TheSportsDB...';
  try{
    const res=await fetch(`${API_BASE}/eventsseason.php?id=${LEAGUE_ID}&s=${SEASON}`);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();const events=data.events||[];
    let updated=0;const liveMap={};
    events.forEach(ev=>{
      const homeN=norm(ev.strHomeTeam),awayN=norm(ev.strAwayTeam);
      const match=MATCHES.find(m=>m.home===homeN&&m.away===awayN);if(!match)return;
      const hS=ev.intHomeScore,aS=ev.intAwayScore,status=ev.strStatus||'';
      const isLive=['HT','1H','2H','ET','PT'].includes(status);
      const isDone=['FT','AET','PEN'].includes(status);
      if(isDone&&hS!==null&&hS!==''&&aS!==null&&aS!==''){const ns=`${hS}-${aS}`;if(state.results[match.id]!==ns){state.results[match.id]=ns;updated++;}}
      if(isLive&&hS!==null&&aS!==null)liveMap[match.id]=`${hS}-${aS}`;
    });
    state.live=liveMap;state.lastSync=new Date().toISOString();saveState();
    const now=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
    dot.className='sync-dot ok';txt.textContent=`Sincronizado ${now} · ${updated} resultado${updated!==1?'s':''} actualizado${updated!==1?'s':''}.`;
    updateHeader();renderMatches();renderBanner();
    if(activeTab==='grupos')renderGroups();
  }catch(err){dot.className='sync-dot err';txt.textContent='Sin conexión con TheSportsDB — ingresa resultados manualmente.';}
  btn.classList.remove('syncing');btn.textContent='⟳ Sincronizar';syncing=false;
}

// ─── BANNER ──────────────────────────────────────────────────────────────────
const SESSIONS=[{date:'2026-06-10',label:'Miércoles 10 jun',days:'11, 12 y 13 de junio',count:8},{date:'2026-06-15',label:'Domingo 15 jun',days:'14 al 17 de junio',count:16},{date:'2026-06-19',label:'Jueves 19 jun',days:'18 al 21 de junio',count:16},{date:'2026-06-23',label:'Lunes 23 jun',days:'22 al 27 de junio',count:32}];
function renderBanner(){
  const banner=document.getElementById('reminder-banner'),icon=document.getElementById('reminder-icon'),title=document.getElementById('reminder-title'),sub=document.getElementById('reminder-sub');
  const now=new Date(),today=now.toISOString().slice(0,10);
  if(state.live&&Object.keys(state.live).length>0){banner.className='reminder-banner playing';banner.style.display='flex';icon.textContent='🔴';title.textContent='Partidos en vivo ahora';sub.textContent='Presiona Sincronizar para ver los marcadores en tiempo real.';return;}
  const next=SESSIONS.find(s=>s.date>=today);if(!next){banner.style.display='none';return;}
  const diffDays=Math.ceil((new Date(next.date+'T12:00:00')-now)/(1000*60*60*24));
  const pending=MATCHES.filter(m=>!getMeta(m).pred&&m.date>today).length;
  if(pending===0){banner.style.display='none';return;}
  if(diffDays<=0){banner.className='reminder-banner urgent';banner.style.display='flex';icon.textContent='⚡';title.textContent=`¡Hoy toca analizar! (${next.label})`;sub.textContent=`Entra a Claude — ${next.count} partidos del ${next.days} sin pronóstico.`;}
  else if(diffDays===1){banner.className='reminder-banner urgent';banner.style.display='flex';icon.textContent='⏰';title.textContent=`Mañana toca analizar — ${next.label}`;sub.textContent=`${pending} partidos pendientes (${next.days}).`;}
  else if(diffDays<=3){banner.className='reminder-banner soon';banner.style.display='flex';icon.textContent='📅';title.textContent=`Análisis en ${diffDays} días — ${next.label}`;sub.textContent=`${pending} partidos pendientes (${next.days}).`;}
  else{banner.style.display='none';}
}

let openDetails={};
function renderMatches(){
  const c=document.getElementById('matches-container');
  const ms=activeFilter==='all'?MATCHES:MATCHES.filter(m=>m.day===activeFilter);
  const days=[...new Set(ms.map(m=>m.day))];
  c.innerHTML=days.map(day=>{
    const dm=ms.filter(m=>m.day===day);
    return`<div class="day-section"><div class="day-header"><div class="day-pill">${day}</div><div class="day-count">${dm.length} partido${dm.length>1?'s':''}</div><div class="day-line"></div></div>${dm.map(m=>renderCard(m)).join('')}</div>`;
  }).join('');
}

function renderCard(m){
  const{pred,conf,winPct,drawPct,lossPct,players,keys,warns,tactic,real,live}=getMeta(m);
  const hasPred=!!pred,hasReal=!!real,pts=calcPoints(pred,real),open=openDetails[m.id]||false,isLive=!!live;
  let cls='match-card';
  if(isLive)cls+=' live';
  else if(hasPred&&hasReal){if(pts===5)cls+=' correct-exact';else if(pts===3)cls+=' correct-result';else cls+=' wrong';}
  else if(hasPred)cls+=' has-pred';

  // Stats data
  const sd=getStatsData(m.home,m.away);
  const maxProb=sd?Math.max(...sd.top_scores.map(s=>s.prob)):1;

  // Real score display
  let realHtml='';
  if(hasReal)realHtml=`<div class="real-score-badge">${real}</div>`;
  else if(isLive)realHtml=`<div class="live-score-badge">EN VIVO ${live}</div>`;

  // Points badge
  let ptsHtml='';
  if(hasReal&&hasPred){
    if(pts===5)ptsHtml=`<div class="pts-earned p5">★ +5 pts</div>`;
    else if(pts===3)ptsHtml=`<div class="pts-earned p3">✓ +3 pts</div>`;
    else ptsHtml=`<div class="pts-earned p0">✗ 0 pts</div>`;
  }

  // My prediction column
  const myPredHtml=hasPred?`
    <div class="my-pred-score">${pred}</div>
    ${winPct!=null?`<div class="win-probs">
      <div class="prob-seg w">${winPct}%</div>
      <div class="prob-seg d">${drawPct}%</div>
      <div class="prob-seg l">${lossPct}%</div>
    </div>`:''}
    ${conf?`<div class="conf-row"><span class="conf-label">Confianza</span><div class="conf-track"><div class="conf-fill ${confClass(conf)}" style="width:${conf}%"></div></div><span class="conf-pct">${conf}%</span></div>`:''}
  `:`<div class="my-pred-score pending">Pendiente de análisis</div>`;

  // Stats prediction column
  const statsPredHtml=sd?`
    <div class="stat-rec-score">${sd.recommend}</div>
    <div class="stat-xg">
      <span class="xg-label">xG</span>
      <span class="xg-val">${sd.xg_h}</span>
      <div class="xg-bar-wrap"><div class="xg-home" style="width:${Math.round(sd.xg_h/(sd.xg_h+sd.xg_a)*100)}%"></div><div class="xg-away" style="width:${Math.round(sd.xg_a/(sd.xg_h+sd.xg_a)*100)}%"></div></div>
      <span class="xg-val">${sd.xg_a}</span>
    </div>
    <div class="stat-options">
      ${sd.top_scores.map((s,i)=>`<div class="stat-option${i===0?' best':''}">
        <span class="stat-option-score">${s.score}</span>
        <div class="stat-option-bar-wrap"><div class="stat-option-bar" style="width:${Math.round(s.prob/maxProb*100)}%"></div></div>
        <span class="stat-option-prob">${s.prob}%</span>
        <span class="stat-option-pts">${s.e_pts}pts</span>
      </div>`).join('')}
    </div>
  `:`<div style="font-size:12px;color:var(--text-4);padding:8px 0">Sin datos estadísticos</div>`;

  // Detail panel
  const detailHtml=hasPred?`
    <div class="match-detail${open?' open':''}" id="detail-${m.id}">
      <div class="detail-grid">
        <div class="detail-block">
          <div class="detail-subtitle">Jugadores clave</div>
          <div class="tag-list">${(players||[]).map(p=>`<span class="tag player">${p}</span>`).join('')}</div>
          <div class="detail-subtitle" style="margin-top:10px">Factores</div>
          <div class="tag-list">${(keys||[]).map(k=>`<span class="tag key">${k}</span>`).join('')}</div>
        </div>
        <div class="detail-block">
          ${(warns||[]).length?`<div class="detail-subtitle">Alertas</div><div class="tag-list">${warns.map(w=>`<span class="tag warn">⚠ ${w}</span>`).join('')}</div>`:''}
        </div>
        ${tactic?`<div class="detail-block detail-full"><div class="detail-subtitle">Táctica esperada</div><div class="tactic-text">${tactic}</div></div>`:''}
      </div>
    </div>`:'';

  const inputHtml=hasPred?`
    <div class="result-input-row">
      <span class="result-label">Resultado real:</span>
      <input class="score-input" id="rh-${m.id}" type="number" min="0" max="20" placeholder="0" value="${real?parseScore(real).h:''}">
      <span class="score-sep">–</span>
      <input class="score-input" id="ra-${m.id}" type="number" min="0" max="20" placeholder="0" value="${real?parseScore(real).a:''}">
      <button class="save-btn" onclick="saveResult(${m.id})">Guardar</button>
      ${hasReal?`<button class="clear-btn" onclick="clearResult(${m.id})">Borrar</button><span class="auto-badge">✓ auto-sync</span>`:''}
    </div>`:`
    <div class="pred-pending-row">
      <span class="pred-pending-label">⏳ Pronóstico pendiente de análisis con Claude</span>
      <button class="set-pred-btn" onclick="openPredInput(${m.id})">Ingresar</button>
    </div>`;

  return`<div class="${cls}" id="card-${m.id}">
    <div class="match-top">
      <div class="match-meta">
        <span class="group-badge">Grupo ${m.group}</span>
        ${isLive?`<span class="live-pill">EN VIVO</span>`:`<span class="match-time-label">${m.time} (CR)</span>`}

      </div>

        <div class="pred-col">
          <div class="pred-col-header mine">

          </div>
          <div class="pred-col-body">${myPredHtml}</div>
        </div>
        <div class="pred-col">
          <div class="pred-col-header stats">
            <span class="pred-col-icon">📊</span>
            <span class="pred-col-title stats">Pronóstico Estadístico</span>
          </div>
          <div class="pred-col-body">${statsPredHtml}</div>
        </div>
      </div>
    </div>
    ${detailHtml}
    ${hasPred?`<button class="detail-toggle" onclick="toggleDetail(${m.id})"><span class="detail-toggle-icon${open?' open':''}">▾</span> ${open?'Ocultar análisis':'Ver análisis completo'}</button>`:''}
    ${inputHtml}
  </div>`;
}

function toggleDetail(id){openDetails[id]=!openDetails[id];document.getElementById(`detail-${id}`)?.classList.toggle('open',openDetails[id]);renderMatches();}
function saveResult(id){const h=parseInt(document.getElementById(`rh-${id}`).value),a=parseInt(document.getElementById(`ra-${id}`).value);if(isNaN(h)||isNaN(a))return;state.results[id]=`${h}-${a}`;saveState();updateHeader();renderMatches();if(activeTab==='grupos')renderGroups();}

function savePred(id){const h=parseInt(document.getElementById(`ph-${id}`).value),a=parseInt(document.getElementById(`pa-${id}`).value);if(isNaN(h)||isNaN(a))return;if(!state.preds[id])state.preds[id]={};state.preds[id].pred=`${h}-${a}`;saveState();updateHeader();renderMatches();}

// ─── GROUPS ──────────────────────────────────────────────────────────────────
function computeStandings(grp){const teams=GROUPS[grp],s={};teams.forEach(t=>{s[t]={pts:0,gf:0,ga:0,pj:0}});MATCHES.filter(m=>m.group===grp).forEach(m=>{const r=state.results[m.id];if(!r)return;const p=parseScore(r);if(!p)return;s[m.home].pj++;s[m.away].pj++;s[m.home].gf+=p.h;s[m.home].ga+=p.a;s[m.away].gf+=p.a;s[m.away].ga+=p.h;if(p.h>p.a)s[m.home].pts+=3;else if(p.h<p.a)s[m.away].pts+=3;else{s[m.home].pts++;s[m.away].pts++;}});return teams.map(t=>({t,...s[t],dg:s[t].gf-s[t].ga})).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);}
function renderGroups(){document.getElementById('groups-container').innerHTML=Object.keys(GROUPS).map(g=>{const rows=computeStandings(g);return`<div class="group-card"><div class="group-card-header"><div class="group-name">Grupo ${g}</div></div><table class="group-table"><thead><tr><th>#</th><th>Selección</th><th>PJ</th><th>DG</th><th>Pts</th></tr></thead><tbody>${rows.map((r,i)=>`<tr class="${i<2?'qualify-row':''}"><td>${i<2?`<span class="qualify-dot"></span>`:i+1}</td><td class="team-col">${r.t}</td><td>${r.pj}</td><td>${r.dg>0?'+'+r.dg:r.dg}</td><td style="font-weight:700;color:${i<2?'var(--green)':'var(--text)'}">${r.pts}</td></tr>`).join('')}</tbody></table></div>`;}).join('');}

// ─── SCORE TAB ───────────────────────────────────────────────────────────────
function renderScore(){
  const played=MATCHES.filter(m=>getMeta(m).real),cr=played.filter(m=>getMeta(m).pts>=3),ex=played.filter(m=>getMeta(m).pts===5);
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-label">Puntos</div><div class="stat-value gold">${totalPts()}</div></div>
    <div class="stat-card"><div class="stat-label">Jugados</div><div class="stat-value">${played.length}</div><div class="stat-sub">de 72</div></div>
    <div class="stat-card"><div class="stat-label">Resultados ✓</div><div class="stat-value">${cr.length}</div><div class="stat-sub">× 3 pts</div></div>
    <div class="stat-card"><div class="stat-label">Exactos ★</div><div class="stat-value gold">${ex.length}</div><div class="stat-sub">× 2 pts extra</div></div>`;
  const det=document.getElementById('score-detail');
  if(!played.length){det.innerHTML=`<div class="loading-msg">Los resultados aparecerán aquí conforme avance el torneo.</div>`;return;}
  det.innerHTML=played.map(m=>{
    const{pred,real,pts}=getMeta(m),ico=pts===5?'★':pts===3?'✓':'✗',col=pts===5?'var(--gold)':pts===3?'var(--green)':'var(--red)';
    return`<div class="history-row"><span class="history-ico" style="color:${col}">${ico}</span><span class="history-match">${m.home} vs ${m.away}</span><span class="history-pred">Pred: ${pred}</span><span class="history-real">Real: ${real}</span><span class="history-pts" style="color:${col}">+${pts}</span></div>`;
  }).join('');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function initApp(){loadState();renderFilters();renderMatches();updateHeader();renderBanner();setTimeout(syncResults,600);}
</script>
